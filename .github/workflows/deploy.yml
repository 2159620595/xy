name: Deploy Xianyu App to 1Panel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-xianyu-production
  cancel-in-progress: true

jobs:
  # ==================== 第一步：在 CI 构建镜像并推送到 GHCR ====================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 允许推送到 ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      # 利用 GitHub Actions 缓存加速 Docker 层复用
      # 第一次构建仍需完整构建，之后只重建变化的层（通常只有 COPY . . 之后的层）
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 第二步：服务器只拉镜像，不再本地 build ====================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    env:
      APP_DIR: /opt/1panel/apps/xianyu-auto-reply
      IMAGE: ghcr.io/${{ github.repository }}:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 只上传 compose 文件和运行时配置，不再上传整个代码包
      - name: Upload compose & config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 5m
          source: "docker-compose.yml,.dockerignore"
          target: ${{ env.APP_DIR }}

      - name: Deploy on server (pull & restart)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m   # 从 60m 缩短到 10m，因为不再本地 build
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ env.APP_DIR }}"
            ENV_FILE="$APP_DIR/.env"

            mkdir -p "$APP_DIR/data" "$APP_DIR/logs" "$APP_DIR/backups"

            if [ ! -f "$ENV_FILE" ]; then
              echo "缺少 $ENV_FILE，请先在服务器创建环境变量文件"
              exit 1
            fi

            cd "$APP_DIR"

            # 登录 GHCR 拉取最新镜像（使用 GITHUB_TOKEN 无需额外 secret）
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新镜像（镜像在 CI 已构建好，这一步通常 < 1min）
            docker compose --env-file .env pull

            # 重启容器（不加 --build，因为镜像已经是最新的）
            docker compose --env-file .env up -d

            # 清理旧镜像释放磁盘空间
            docker image prune -f

            docker compose ps
            docker compose logs --tail=50 xianyu-app | cat || docker compose logs --tail=50 | cat

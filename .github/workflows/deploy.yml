name: Deploy Xianyu App to 1Panel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-xianyu-production
  cancel-in-progress: true

jobs:
  # ==================== 第一步：CI 构建镜像，同时推送到 GHCR 和阿里云 ACR ====================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-pkla7gt01j0vnny1.cn-guangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            crpi-pkla7gt01j0vnny1.cn-guangzhou.personal.cr.aliyuncs.com/2159620595_xianyu/xianyu:latest
            crpi-pkla7gt01j0vnny1.cn-guangzhou.personal.cr.aliyuncs.com/2159620595_xianyu/xianyu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 第二步：服务器从阿里云 ACR 拉镜像（国内速度快）====================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    env:
      APP_DIR: /opt/1panel/apps/xianyu-auto-reply
      ACR_IMAGE: crpi-pkla7gt01j0vnny1.cn-guangzhou.personal.cr.aliyuncs.com/2159620595_xianyu/xianyu:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload compose & config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 5m
          source: "docker-compose.yml,.dockerignore,backend/global_config.yml"
          target: ${{ env.APP_DIR }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ env.APP_DIR }}"
            ENV_FILE="$APP_DIR/.env"

            mkdir -p "$APP_DIR/data" "$APP_DIR/logs" "$APP_DIR/backups"

            if [ ! -f "$ENV_FILE" ]; then
              echo "缺少 $ENV_FILE，请先在服务器创建环境变量文件"
              exit 1
            fi

            cd "$APP_DIR"

            # 登录阿里云 ACR（国内拉取速度快）
            echo "${{ secrets.ACR_PASSWORD }}" | \
              docker login crpi-pkla7gt01j0vnny1.cn-guangzhou.personal.cr.aliyuncs.com \
              -u ${{ secrets.ACR_USERNAME }} --password-stdin

            docker compose --env-file .env pull
            docker compose --env-file .env up -d

            docker image prune -f

            echo "部署完成"
            docker compose ps
            docker compose logs --tail=50 xianyu-app | cat || \
              docker compose logs --tail=50 | cat
